<svg viewBox="0 0 240 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5c7bff"/>
      <stop offset="0.55" stop-color="#2451ff"/>
      <stop offset="1" stop-color="#e6203f"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#ffe28a"/>
      <stop offset="0.45" stop-color="#f5b942"/>
      <stop offset="1" stop-color="#e6203f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- exhaust flame -->
  <ellipse cx="120" cy="345" rx="34" ry="70" fill="url(#flame)"/>

  <!-- fins -->
  <path d="M85 250 L45 320 L88 300 Z" fill="#e6203f"/>
  <path d="M155 250 L195 320 L152 300 Z" fill="#e6203f"/>

  <!-- body -->
  <path d="M120 20
           C 160 60, 168 150, 160 260
           L 80 260
           C 72 150, 80 60, 120 20 Z" fill="url(#bodyGrad)"/>

  <!-- nose highlight -->
  <path d="M120 20 C 140 42 150 80 152 120 L 120 120 Z" fill="#ffffff" opacity="0.18"/>

  <!-- window -->
  <circle cx="120" cy="120" r="26" fill="#0b1340"/>
  <circle cx="120" cy="120" r="19" fill="#f6f7fb"/>
  <circle cx="112" cy="112" r="6" fill="#9fb0ff" opacity="0.7"/>

  <!-- body stripe -->
  <rect x="80" y="205" width="80" height="10" fill="#f6f7fb" opacity="0.85"/>
</svg>
