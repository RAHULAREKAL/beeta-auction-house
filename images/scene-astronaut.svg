<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060714"/>
      <stop offset="0.6" stop-color="#0b1340"/>
      <stop offset="1" stop-color="#1a0b3a"/>
    </linearGradient>
    <radialGradient id="planetGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5c7bff"/>
      <stop offset="1" stop-color="#e6203f"/>
    </radialGradient>
    <linearGradient id="suitA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f7fb"/>
      <stop offset="1" stop-color="#aab3d9"/>
    </linearGradient>
    <linearGradient id="visorA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2451ff"/>
      <stop offset="1" stop-color="#e6203f"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#skyA)"/>

  <g fill="#f6f7fb">
    <circle cx="90" cy="120" r="1.6" opacity="0.8"/><circle cx="300" cy="60" r="1.2" opacity="0.6"/>
    <circle cx="500" cy="160" r="1.7" opacity="0.7"/><circle cx="1200" cy="90" r="1.4" opacity="0.6"/>
    <circle cx="1350" cy="220" r="1.6" opacity="0.7"/><circle cx="1500" cy="120" r="1.2" opacity="0.55"/>
    <circle cx="80" cy="400" r="1.3" opacity="0.5"/><circle cx="1450" cy="500" r="1.4" opacity="0.6"/>
    <circle cx="1550" cy="650" r="1.2" opacity="0.5"/><circle cx="60" cy="700" r="1.3" opacity="0.5"/>
  </g>

  <!-- distant planet -->
  <circle cx="1280" cy="620" r="150" fill="url(#planetGlow)" opacity="0.85"/>
  <ellipse cx="1280" cy="640" rx="230" ry="40" fill="none" stroke="#f5b942" stroke-width="6" opacity="0.6"/>

  <!-- astronaut, centered, floating -->
  <g transform="translate(560,150) scale(1.6)">
    <rect x="90" y="90" width="80" height="110" rx="18" fill="#0b1340"/>
    <path d="M60 150 C60 110 90 90 130 90 C170 90 200 110 200 150 L195 260 C195 285 165 300 130 300 C95 300 65 285 65 260 Z" fill="url(#suitA)"/>
    <rect x="105" y="175" width="50" height="34" rx="6" fill="#0b1340"/>
    <circle cx="118" cy="192" r="5" fill="#e6203f"/>
    <circle cx="142" cy="192" r="5" fill="#f5b942"/>
    <path d="M62 160 C40 175 30 210 42 250 C48 265 65 270 72 258 L82 190 Z" fill="url(#suitA)"/>
    <path d="M198 160 C220 175 230 210 218 250 C212 265 195 270 188 258 L178 190 Z" fill="url(#suitA)"/>
    <circle cx="130" cy="70" r="62" fill="url(#suitA)"/>
    <circle cx="130" cy="72" r="46" fill="url(#visorA)"/>
    <path d="M96 55 C110 40 150 40 164 55" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.35"/>
    <circle cx="112" cy="60" r="8" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- tether line -->
  <path d="M720 620 C 640 680 560 720 480 760" stroke="#f6f7fb" stroke-width="3" fill="none" opacity="0.3" stroke-dasharray="6 8"/>
</svg>
